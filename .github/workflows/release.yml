name: Release to NuGet

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true
        default: '0.1.0'

jobs:
  publish:
    name: Build, Pack & Publish to NuGet
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Extract Version
      id: get_version
      run: |
        if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
        else
          # refs/tags/v0.1.0 -> 0.1.0
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
        fi

    - name: Restore dependencies
      run: dotnet restore

    - name: Build libraries
      run: dotnet build --no-restore -c Release -p:Version=$VERSION

    - name: Run Tests (Final CI check before release)
      run: dotnet test --no-build -c Release

    - name: Pack NuGet packages
      run: dotnet pack --no-build -c Release -p:Version=$VERSION -p:IncludeSymbols=true -p:SymbolPackageFormat=snupkg -o ./artifacts

    - name: Push to NuGet
      run: dotnet nuget push "./artifacts/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
